services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: hvac_intel
      POSTGRES_USER: hvac_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
    ports: ["9092:9092"]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  backend:
    build: ./backend
    command: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --timeout 120 --graceful-timeout 30 --keep-alive 5
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [postgres, redis, kafka]
    volumes: ["ml_artifacts:/app/ml/artifacts"]

  celery-worker:
    build: ./backend
    command: celery -A app.pipeline.celery_app worker -Q features,scoring -c 4
    env_file: .env
    depends_on: [redis, kafka, postgres]
    volumes: ["ml_artifacts:/app/ml/artifacts"]

  celery-beat:
    build: ./backend
    command: celery -A app.pipeline.celery_app beat --loglevel=info
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on: [redis, postgres]
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    env_file: .env.local
    depends_on: [backend]

  prometheus:
    image: prom/prometheus:v2.52.0
    volumes: ["./infra/prometheus.yml:/etc/prometheus/prometheus.yml"]
    ports: ["9090:9090"]
    depends_on: [backend]

  grafana:
    image: grafana/grafana:10.4.2
    ports: ["3001:3000"]
    volumes: ["grafana_data:/var/lib/grafana"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    depends_on: [prometheus]

volumes:
  pgdata:
  grafana_data:
  ml_artifacts:
