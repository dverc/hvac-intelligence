apiVersion: apps/v1
kind: Deployment
metadata:
  name: hvac-backend
  namespace: hvac-intelligence
  labels:
    app: hvac-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hvac-backend
  template:
    metadata:
      labels:
        app: hvac-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/dverc/hvac-intelligence/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - secretRef:
                name: hvac-intelligence-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: ml-artifacts
              mountPath: /app/ml/artifacts
              readOnly: true
      volumes:
        - name: ml-artifacts
          emptyDir: {}
