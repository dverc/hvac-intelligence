apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hvac-intelligence-ingress
  namespace: hvac-intelligence
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: REPLACE_ME_DOMAIN
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: hvac-backend
                port:
                  number: 8000
          - path: /webhook
            pathType: Prefix
            backend:
              service:
                name: hvac-backend
                port:
                  number: 8000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: hvac-backend
                port:
                  number: 8000
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: hvac-backend
                port:
                  number: 8000
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: hvac-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hvac-frontend
                port:
                  number: 3000
