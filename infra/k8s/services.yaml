apiVersion: v1
kind: Service
metadata:
  name: hvac-backend
  namespace: hvac-intelligence
  labels:
    app: hvac-backend
spec:
  type: ClusterIP
  selector:
    app: hvac-backend
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: hvac-frontend
  namespace: hvac-intelligence
  labels:
    app: hvac-frontend
spec:
  type: NodePort
  selector:
    app: hvac-frontend
  ports:
    - name: http
      port: 3000
      targetPort: http
      nodePort: 30080
