apiVersion: apps/v1
kind: Deployment
metadata:
  name: hvac-frontend
  namespace: hvac-intelligence
  labels:
    app: hvac-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hvac-frontend
  template:
    metadata:
      labels:
        app: hvac-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/dverc/hvac-intelligence/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
