name: CI

on:
  push:
  pull_request:

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  DATABASE_URL: postgresql+asyncpg://hvac_user:hvac_test@localhost:5432/hvac_intel_test
  TEST_DATABASE_URL: postgresql+asyncpg://hvac_user:hvac_test@localhost:5432/hvac_intel_test

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: hvac_user
          POSTGRES_PASSWORD: hvac_test
          POSTGRES_DB: hvac_intel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hvac_user -d hvac_intel"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --extra-index-url https://download.pytorch.org/whl/cpu \
            torch==2.3.0+cpu \
            transformers==4.41.1
          pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Create test database
        env:
          PGPASSWORD: hvac_test
        run: |
          psql -h localhost -U hvac_user -d hvac_intel -c "CREATE DATABASE hvac_intel_test;" || true

      - name: Run Alembic migrations
        env:
          ANTHROPIC_API_KEY: ci-placeholder
          OPENAI_API_KEY: sk-ci-placeholder
          VAPI_API_KEY: ci-placeholder
          VAPI_WEBHOOK_SECRET: ci-placeholder
          VAPI_ASSISTANT_ID: ci-placeholder
          PINECONE_API_KEY: ci-placeholder
          PINECONE_ENVIRONMENT: us-east-1
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          REDIS_URL: redis://localhost:6379/0
        run: alembic upgrade head

      - name: Run tests with coverage
        env:
          ANTHROPIC_API_KEY: ci-placeholder
          OPENAI_API_KEY: sk-ci-placeholder
          VAPI_API_KEY: ci-placeholder
          VAPI_WEBHOOK_SECRET: ci-placeholder
          VAPI_ASSISTANT_ID: ci-placeholder
          PINECONE_API_KEY: ci-placeholder
          PINECONE_ENVIRONMENT: us-east-1
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          REDIS_URL: redis://localhost:6379/0
          MODEL_ARTIFACTS_PATH: ../ml/artifacts
          RAG_MOCK_INDEX_PATH: ../data/knowledge/.mock_vector_index.json
        run: |
          pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=60

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
        run: npm run build
