name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend
  K8S_NAMESPACE: hvac-intelligence

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  # deploy-kubernetes requires a configured cluster and KUBECONFIG secret.
  # Disabled until production infrastructure is provisioned.
  # To enable: remove 'if: false' and set KUBECONFIG in GitHub repo secrets.
  deploy-kubernetes:
    if: false
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_DATA" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Apply Kubernetes manifests
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          kubectl apply -f infra/k8s/namespace.yaml
          if [ -f infra/k8s/secrets.yaml ]; then
            kubectl apply -f infra/k8s/secrets.yaml
          else
            echo "Skipping secrets.yaml (create from secrets.yaml.template in cluster)"
          fi
          sed -e "s|ghcr.io/dverc/hvac-intelligence/backend:latest|${{ env.BACKEND_IMAGE }}:${IMAGE_TAG}|g" \
              -e "s|ghcr.io/dverc/hvac-intelligence/frontend:latest|${{ env.FRONTEND_IMAGE }}:${IMAGE_TAG}|g" \
              infra/k8s/backend-deployment.yaml \
              infra/k8s/celery-deployment.yaml \
              infra/k8s/frontend-deployment.yaml \
            | kubectl apply -f -
          kubectl apply -f infra/k8s/services.yaml
          kubectl apply -f infra/k8s/ingress.yaml
          kubectl rollout status deployment/hvac-backend -n "${{ env.K8S_NAMESPACE }}" --timeout=300s
          kubectl rollout status deployment/hvac-celery-worker -n "${{ env.K8S_NAMESPACE }}" --timeout=300s
          kubectl rollout status deployment/hvac-frontend -n "${{ env.K8S_NAMESPACE }}" --timeout=300s
